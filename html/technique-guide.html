<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Technique Guide</title>
  <link rel="stylesheet" href="recipe.css" />
  <link rel="stylesheet" href="print.css" />
</head>
<body>
  <main class="recipe-print-page">
    <div class="screen-toolbar">
      <a class="screen-toolbar__link" href="index.html">Back to recipes</a>
      <button class="screen-toolbar__button" type="button" data-print-recipe>Print</button>
    </div>

    <article class="entry-sheet">
      <header class="fair-header">
        <h1>Technique Guide</h1>
        
        
      </header>

      <section class="recipe-body">
<h1>Technique Guide</h1>
<h2>High-impact techniques</h2>
<ul>
  <li>Brown sausage aggressively.</li>
  <li>Preserve fond.</li>
  <li>Toast flour.</li>
  <li>Bloom spices.</li>
  <li>Layer pepper.</li>
  <li>Freeze biscuits before baking.</li>
  <li>Use milk + cream.</li>
  <li>Finish with acid.</li>
</ul>
      </section>
    </article>
  </main>

  <script src="print-fit.js"></script>
  <script>
    (function () {
      const button = document.querySelector("[data-print-recipe]");
      if (!button) return;

      button.addEventListener("click", () => {
        if (typeof fitAllSheets === "function") {
          fitAllSheets();
        }
        window.print();
      });
    })();
  </script>
</body>
</html>
