<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Experiments</title>
  <link rel="stylesheet" href="recipe.css" />
  <link rel="stylesheet" href="print.css" />
</head>
<body>
  <main class="recipe-print-page">
    <div class="screen-toolbar">
      <a class="screen-toolbar__link" href="index.html">Back to recipes</a>
      <button class="screen-toolbar__button" type="button" data-print-recipe>Print</button>
    </div>

    <article class="entry-sheet">
      <header class="fair-header">
        <h1>Experiments</h1>
        <p class="recipe-summary">Track hypothesis, changes, tasting notes, and scores for each trial.</p>
        
      </header>

      <section class="recipe-body">
<h1>Experiments</h1>
<p>Track hypothesis, changes, tasting notes, and scores for each trial.</p>
      </section>
    </article>
  </main>

  <script src="print-fit.js"></script>
  <script>
    (function () {
      const button = document.querySelector("[data-print-recipe]");
      if (!button) return;

      button.addEventListener("click", () => {
        if (typeof fitAllSheets === "function") {
          fitAllSheets();
        }
        window.print();
      });
    })();
  </script>
</body>
</html>
